<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hill Climb Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:Arial;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

#controls{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
}

button{
font-size:22px;
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
background:black;
color:white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
Coins: <span id="coins">0</span> |
Fuel: <span id="fuel">100</span>
</div>

<div id="controls">
<button ontouchstart="gas=true" ontouchend="gas=false">GAS</button>
<button ontouchstart="brake=true" ontouchend="brake=false">BRAKE</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let gas=false
let brake=false

let gravity=0.6
let coins=0
let fuel=100

let car={
x:200,
y:200,
vy:0,
speed:0,
width:60,
height:30
}

let hills=[]
let coinList=[]

for(let i=0;i<500;i++){

let y=350+Math.sin(i*0.5)*80

hills.push(y)

if(Math.random()<0.08){
coinList.push({x:i*40,y:y-40})
}

}

let offset=0

function getGround(x){

let index=Math.floor((x+offset)/40)

return hills[index]||400

}

function game(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(fuel>0 && gas){
car.speed+=0.2
fuel-=0.05
}

if(brake){
car.speed-=0.2
}

car.speed*=0.98
offset+=car.speed

car.vy+=gravity
car.y+=car.vy

let ground=getGround(car.x)

if(car.y+car.height>ground){

car.y=ground-car.height
car.vy=0

}

ctx.beginPath()

for(let i=0;i<hills.length;i++){

let x=i*40-offset
let y=hills[i]

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

}

ctx.lineTo(canvas.width,canvas.height)
ctx.lineTo(0,canvas.height)
ctx.fillStyle="green"
ctx.fill()

for(let c of coinList){

let cx=c.x-offset
let cy=c.y

ctx.beginPath()
ctx.arc(cx,cy,10,0,Math.PI*2)
ctx.fillStyle="yellow"
ctx.fill()

if(Math.abs(cx-car.x)<30 && Math.abs(cy-car.y)<30){

coins++
c.x=-9999

}

}

ctx.fillStyle="red"
ctx.fillRect(car.x,car.y,car.width,car.height)

ctx.beginPath()
ctx.arc(car.x+15,car.y+car.height,15,0,Math.PI*2)
ctx.arc(car.x+45,car.y+car.height,15,0,Math.PI*2)
ctx.fillStyle="black"
ctx.fill()

document.getElementById("coins").innerText=Math.floor(coins)
document.getElementById("fuel").innerText=Math.floor(fuel)

requestAnimationFrame(game)

}

game()

</script>

</body>
</html>
