<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hill Climb Lite</title>
<style>

body{
margin:0;
background:#87ceeb;
font-family:Arial;
overflow:hidden;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

#controls{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
}

button{
font-size:20px;
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
}

#shop{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
color:white;
padding:20px;
display:none;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
Coins: <span id="coins">0</span> |
Fuel: <span id="fuel">100</span>
</div>

<div id="controls">
<button ontouchstart="gas=true" ontouchend="gas=false">GAS</button>
<button ontouchstart="brake=true" ontouchend="brake=false">BRAKE</button>
<button onclick="toggleShop()">SHOP</button>
</div>

<div id="shop">
<h3>Shop</h3>

<p>🚗 Car 2 - 50 coins  
<button onclick="buyCar()">Buy</button></p>

<p>🗺️ Desert Map - 100 coins  
<button onclick="buyMap()">Unlock</button></p>

<button onclick="toggleShop()">Close</button>
</div>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let gas=false
let brake=false

let coins=0
let fuel=100

let car={
x:200,
y:300,
speed:0,
power:0.2
}

let hills=[]
let coinList=[]

for(let i=0;i<500;i++){
let y=350+Math.sin(i*0.5)*80
hills.push(y)

if(Math.random()<0.1){
coinList.push({x:i*40,y:y-40})
}
}

let offset=0

function toggleShop(){
let shop=document.getElementById("shop")
shop.style.display=shop.style.display=="none"?"block":"none"
}

function buyCar(){
if(coins>=50){
coins-=50
car.power=0.35
alert("New Car Purchased!")
}
}

function buyMap(){
if(coins>=100){
coins-=100
document.body.style.background="#f4d03f"
alert("Desert Map Unlocked!")
}
}

function game(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(fuel>0){
if(gas){
car.speed+=car.power
fuel-=0.05
}

if(brake){
car.speed-=0.3
}
}

car.speed*=0.98
offset+=car.speed

ctx.beginPath()

for(let i=0;i<hills.length;i++){
let x=i*40-offset
let y=hills[i]

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)
}

ctx.lineTo(canvas.width,canvas.height)
ctx.lineTo(0,canvas.height)
ctx.fillStyle="green"
ctx.fill()

for(let c of coinList){

let cx=c.x-offset
let cy=c.y

ctx.beginPath()
ctx.arc(cx,cy,10,0,Math.PI*2)
ctx.fillStyle="yellow"
ctx.fill()

if(Math.abs(cx-220)<20 && Math.abs(cy-260)<40){
coins++
c.x=-9999
}
}

ctx.fillStyle="red"
ctx.fillRect(200,230,60,30)

ctx.beginPath()
ctx.arc(220,260,15,0,Math.PI*2)
ctx.arc(250,260,15,0,Math.PI*2)
ctx.fillStyle="black"
ctx.fill()

document.getElementById("coins").innerText=Math.floor(coins)
document.getElementById("fuel").innerText=Math.floor(fuel)

requestAnimationFrame(game)

}

game()

</script>

</body>
</html>
